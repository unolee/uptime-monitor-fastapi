name: Deploy
on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Specific commit SHA to deploy (leave empty for latest)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build client
        run: |
          cd client
          npm ci
          npm run build
          mv dist ../server/static
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
      - name: Deploy to preview
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude '.github' --exclude '__pycache__' --exclude '.venv' \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ secrets.DEPLOY_PATH }}/
      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "\
            cd ${{ secrets.DEPLOY_PATH }} && \
            python3 -m venv .venv && \
            .venv/bin/pip install -r requirements.txt && \
            pm2 delete ${{ secrets.SITE_ID }}-preview 2>/dev/null; \
            pm2 start .venv/bin/uvicorn --name ${{ secrets.SITE_ID }}-preview --interpreter .venv/bin/python3 -- app.main:app --host 0.0.0.0 --port ${{ secrets.PREVIEW_PORT }} && \
            sleep 2 && \
            pm2 logs ${{ secrets.SITE_ID }}-preview --lines 20 --nostream"
      - name: Notify Site Manager
        if: always()
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"action":"completed","workflow_run":{"conclusion":"'${{ job.status }}'","head_sha":"${{ github.sha }}","head_commit":{"message":"deploy"}},"repository":{"full_name":"${{ github.repository }}"},"site_id":"${{ secrets.SITE_ID }}"}'
